name: pipeline

on:
  push:
    branches:
      - develop
      - staging
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: install and test
        run: |
          cd app
          npm install
          npm test

  develop:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/develop'
    environment: development
    steps:
      - uses: actions/checkout@v3
      - uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build and push DEV image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/myapp:dev .
          docker build -t ${{ secrets.DOCKER_USERNAME }}/myapp:dev-${{ github.sha }} .
          docker push ${{ secrets.DOCKER_USERNAME }}/myapp:dev
          docker push ${{ secrets.DOCKER_USERNAME }}/myapp:dev-${{ github.sha }}

      - name: Deploy to DEV
        run: |
          echo "Deploying to DEV environment"
          echo "Image: ${{ secrets.DOCKER_USERNAME }}/myapp:dev"
          echo "Commit: ${{ github.sha }}"

  staging:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/staging'
    environment: staging
    steps:
      - uses: actions/checkout@v3
      - uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME}}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build and push STAGING image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/myapp:staging .
          docker build -t ${{ secrets.DOCKER_USERNAME }}/myapp:staging-${{ github.sha }} .
          docker push ${{ secrets.DOCKER_USERNAME }}/myapp:staging
          docker push ${{ secrets.DOCKER_USERNAME }}/myapp:staging-${{ github.sha }}
          
      - name: Deploy to STAGING
        run: |
          echo "Deploying to STAGING environment"
          echo "Image: ${{ secrets.DOCKER_USERNAME }}/myapp:staging"
          echo "Commit: ${{ github.sha }}"
  prod:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v3
      - uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME}}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build and push PRODUCTION image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/myapp:production .
          docker build -t ${{ secrets.DOCKER_USERNAME }}/myapp:production-${{ github.sha }} .
          docker push ${{ secrets.DOCKER_USERNAME }}/myapp:production
          docker push ${{ secrets.DOCKER_USERNAME }}/myapp:production-${{ github.sha }}

      - name: Deploy to PRODUCTION
        run: |
          echo "Deploying to PRODUCTION environment"
          echo "Image: ${{ secrets.DOCKER_USERNAME }}/myapp:production"
          echo "Commit: ${{ github.sha }}"

  # ── Notify after all deploys ───────────────────
  notify:
    runs-on: ubuntu-latest
    needs: [develop, staging, prod]
    if: always()    # runs even if some jobs were skipped
    steps:
      - name: Pipeline summary
        run: |
          echo "Pipeline finished!"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
          echo "Triggered by: ${{ github.actor }}"

